services:
  # Django Web Service
  - type: web
    name: agrosense
    env: python
    plan: free
    buildCommand: bash ./build.sh
    startCommand: gunicorn agrosense_project.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: agrosense_project.settings
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrosense
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12
    autoDeploy: true
    
  # PostgreSQL Database
  - type: pserv
    name: agrosense-db
    plan: free
    env: postgres
    envVars:
      - key: POSTGRES_DB
        value: agrosense
      - key: POSTGRES_USER
        value: agrosense
      - key: POSTGRES_PASSWORD
        generateValue: true

databases:
  - name: agrosense
    plan: free
    databaseName: agrosense
    user: agrosense
