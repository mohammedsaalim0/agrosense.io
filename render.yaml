services:
  # Django Web Service
  - type: web
    name: agrosense-io
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    # Run migrations at startup
    startCommand: "python manage.py migrate --no-input && python seed_data.py && gunicorn agrosense_project.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: agrosense_project.settings
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrosense_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11
    autoDeploy: true

databases:
  - name: agrosense_db
    plan: free
    databaseName: agrosense
    user: agrosense
